<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>白星 ひなつのホームページ</title>
</head>
<!-- フレーム分割（frameset） -->
<frameset cols="200,*">
    <!-- 左側のメニュー画面 -->
    <frame src="menu.html" name="left">
    <!-- 右側のメインコンテンツ画面 -->
    <frame src="main.html" name="right">

    
    <noframes>
        <body>
            <p>このページはフレームを使用しています。表示されない場合は<a href="main.html">こちら</a>。</p>
        </body>
    </noframes>
</frameset>
</html>
